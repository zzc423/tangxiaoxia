name: Deploy to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Fix asset paths for GitHub Pages subdirectory
        run: |
          find out -name "*.html" -exec sed -i 's|href="/_|href="/tangxiaoxia/_|g' {} \;
          find out -name "*.html" -exec sed -i 's|src="/_|src="/tangxiaoxia/_|g' {} \;
          find out -name "*.html" -exec sed -i 's|href="/about"|href="/tangxiaoxia/about"|g' {} \;
          find out -name "*.html" -exec sed -i 's|href="/services"|href="/tangxiaoxia/services"|g' {} \;
          find out -name "*.html" -exec sed -i 's|href="/stories"|href="/tangxiaoxia/stories"|g' {} \;
          find out -name "*.html" -exec sed -i 's|href="/contact"|href="/tangxiaoxia/contact"|g' {} \;
          find out -name "*.html" -exec sed -i 's|href="/patient"|href="/tangxiaoxia/patient"|g' {} \;

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
